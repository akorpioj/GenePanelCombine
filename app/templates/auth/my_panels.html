{% extends "base.html" %}

{% block title %}My Panels{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/panel-library.css') }}">
<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
    <div class="bg-white shadow sm:rounded-lg">
        <div class="px-4 py-5 sm:px-6">
            <h1 class="text-2xl font-bold text-gray-900">My Panels</h1>
            <p class="mt-1 text-sm text-gray-500">Manage your genetic panels with version control.</p>
        </div>
    </div>

    <div class="mt-6">
        {% include 'auth/_my_panels.html' %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/version-timeline.js') }}?v={{ cache_bust }}"></script>
<script src="{{ url_for('static', filename='js/diff-viewer.js') }}?v={{ cache_bust }}"></script>
<script type="module" src="{{ url_for('static', filename='js/pages/profilePage.js') }}?v={{ cache_bust }}"></script>
{% endblock %}
