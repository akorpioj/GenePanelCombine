<!-- Technical Information Section Template -->
<div class="bg-gray-50 rounded-lg p-4">
    <h4 class="text-lg font-medium text-gray-900 mb-3">Technical Information</h4>
    <dl class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <dt class="text-sm font-medium text-gray-500">Panel ID</dt>
            <dd class="mt-1 text-sm text-gray-900 font-mono">{{PANEL_ID}}</dd>
        </div>
        <div>
            <dt class="text-sm font-medium text-gray-500">Last Updated</dt>
            <dd class="mt-1 text-sm text-gray-900">{{LAST_UPDATED}}</dd>
        </div>
        <div>
            <dt class="text-sm font-medium text-gray-500">Last Accessed</dt>
            <dd class="mt-1 text-sm text-gray-900">{{LAST_ACCESSED}}</dd>
        </div>
        <div>
            <dt class="text-sm font-medium text-gray-500">Version Count</dt>
            <dd class="mt-1 text-sm text-gray-900">{{VERSION_COUNT}}</dd>
        </div>
    </dl>
</div>
