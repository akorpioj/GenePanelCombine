<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Sort Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Panel Sort Test</h1>
        
        <!-- Sort Control -->
        <div class="mb-6 p-4 bg-white rounded-lg shadow">
            <div class="flex items-center space-x-4">
                <label class="text-sm font-medium text-gray-700">Sort by:</label>
                <select id="sort-select" class="px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="created_at_desc">Newest First</option>
                    <option value="created_at_asc">Oldest First</option>
                    <option value="name_asc">Name A-Z</option>
                    <option value="name_desc">Name Z-A</option>
                    <option value="gene_count_desc">Most Genes</option>
                    <option value="gene_count_asc">Fewest Genes</option>
                    <option value="accessed_desc">Recently Accessed</option>
                </select>
                <button onclick="panelLibrary.generateDemoData()" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                    Generate Test Data
                </button>
            </div>
        </div>
        
        <!-- Panel Grid -->
        <div id="panel-library-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Panels will be rendered here -->
        </div>
    </div>

    <!-- Load the panel library script -->
    <script src="app/static/js/panel-library-grid.js"></script>
    <script>
        // Initialize the panel library
        const panelLibrary = new PanelLibraryGrid();
        
        // Override loadPanels to use demo data for testing
        panelLibrary.loadPanels = async function() {
            this.generateDemoData();
        };
        
        // Reinitialize with demo data
        panelLibrary.init();
    </script>
</body>
</html>
